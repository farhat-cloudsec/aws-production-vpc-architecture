<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Secure App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #232f3e; } /* AWS Dark Blue Color */
        p { color: #5a6b7c; }
        .badge {
            background-color: #2ec4b6;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My First AWS Project 🚀</h1>
        <p>This application is running securely inside a <strong>Private Subnet</strong>.</p>
        <div class="badge">Status: Secure & Active</div>
    </div>
</body>
</html>
